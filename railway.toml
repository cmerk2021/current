# Railway deployment
#
# Recommended approach: deploy as two services from this repository.
#
#   1) `current-web`
#        Builder: Nixpacks or Dockerfile (./Dockerfile)
#        Build:   npm install && npm run build
#        Start:   (served by nginx in the Docker image)
#        Env:     VITE_PB_URL = https://<your-pocketbase-service>.up.railway.app
#
#   2) `current-pocketbase`
#        Builder: Dockerfile (./docker/pocketbase.Dockerfile)
#        Volume:  Mount a persistent volume at /pb/pb_data
#        Port:    8090
#
# After both services are up:
#   - Open the PocketBase admin UI and import pb_schema.json.
#   - Set VITE_PB_URL on the web service to the PocketBase URL and redeploy.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
