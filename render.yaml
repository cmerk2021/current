services:
  - type: web
    name: current-web
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_PB_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: current-pocketbase
    env: docker
    dockerfilePath: docker/pocketbase.Dockerfile
    dockerContext: .
    disk:
      name: pb-data
      mountPath: /pb/pb_data
      sizeGB: 1
    healthCheckPath: /api/health
